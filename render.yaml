services:
  - type: web
    name: aura-insights-backend
    env: docker # Changed from python to docker
    dockerContext: backend # Points to the backend folder
    dockerfilePath: Dockerfile
    plan: free
    region: ohio
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: OPENROUTER_API_KEY
        fromContext: envVar # Will take it from Render dashboard settings
      - key: RECOMMENDED_MODEL
        value: "anthropic/claude-3.5-sonnet"
    autoDeploy: true
