services:
  - type: web
    name: aura-insights-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        value: sqlite:///db.sqlite3 # Using persistent disk or internal for now
    # This is how we tell Render to include Chrome
    plan: free
    region: ohio
    # For Selenium on Render, we use a custom Dockerfile if we want it to be 100% stable
    # But let's try the script first.
