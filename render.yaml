services:
  - type: web
    name: aura-insights-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: RECOMMENDED_MODEL
        value: "anthropic/claude-3.5-sonnet"
    autoDeploy: true
